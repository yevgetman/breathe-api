<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe API Demo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:1200px;margin:0 auto;background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:30px;text-align:center}
        .header h1{font-size:2.5em;margin-bottom:10px;font-weight:700;letter-spacing:2px}
        .header p{font-size:1.1em;opacity:.9}
        .content{padding:30px}
        #map{height:400px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);margin-bottom:24px}
        .controls{background:#f8f9fa;padding:25px;border-radius:12px;margin-bottom:24px}
        .controls h2{font-size:1.3em;margin-bottom:16px;color:#333}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
        label{display:block;margin-bottom:6px;font-weight:600;color:#555;font-size:.9em}
        input[type="number"]{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:1em;transition:border-color .2s}
        input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
        .checkbox-group{margin-bottom:16px}
        .checkbox-label{display:flex;align-items:center;cursor:pointer;user-select:none;font-size:.95em}
        .checkbox-label input{width:18px;height:18px;margin-right:8px}
        button{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:12px 28px;border:none;border-radius:8px;font-size:1em;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;width:100%}
        button:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(102,126,234,.4)}
        button:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .hidden{display:none}
        .spinner{border:3px solid #f3f3f3;border-top:3px solid #667eea;border-radius:50%;width:36px;height:36px;animation:spin .8s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading{text-align:center;padding:20px;color:#667eea;font-weight:600}

        /* Dashboard grid */
        .dashboard{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
        .panel{background:#f8f9fa;border-radius:12px;padding:20px;border-left:4px solid #4a6fa5}
        .panel h3{font-size:1.15em;margin-bottom:12px;color:#2d3748}
        .panel-aqi{border-left-color:#48bb78}
        .panel-weather{border-left-color:#4299e1}
        .panel-pollen{border-left-color:#C8D4A8}
        .panel-astro{border-left-color:#E8A838}
        .panel-hourly{border-left-color:#8AAED0}
        .panel-gems{border-left-color:#D4A8A0}
        .panel-forecast{border-left-color:#4299e1}
        .full-width{grid-column:1/-1}
        .metric-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:.9em}
        .metric-row:last-child{border-bottom:none}
        .metric-label{color:#718096}
        .metric-value{font-weight:600;color:#2d3748}
        .aqi-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-weight:700;font-size:1em;color:white;margin-bottom:10px}
        .weather-hero{text-align:center;margin-bottom:12px}
        .weather-temp{font-size:2.8em;font-weight:700;color:#2d3748;line-height:1}
        .weather-desc{font-size:1em;color:#718096;margin-top:2px}

        /* Pollen pills */
        .pollen-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
        .pollen-pill{padding:6px 14px;border-radius:16px;font-size:.85em;font-weight:600;background:#edf2f7;color:#4a5568}
        .pollen-none{background:#f0fff4;color:#38a169}
        .pollen-low{background:#f0fff4;color:#38a169}
        .pollen-moderate{background:#fffff0;color:#d69e2e}
        .pollen-high{background:#fff5f5;color:#e53e3e}
        .pollen-very_high{background:#fff5f5;color:#c53030;font-weight:700}

        /* Hourly strip */
        .hourly-strip{display:flex;gap:0;overflow-x:auto;padding:8px 0}
        .hourly-strip::-webkit-scrollbar{height:6px}
        .hourly-strip::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:3px}
        .hour-tick{min-width:56px;text-align:center;padding:6px 4px;font-size:.78em;border-right:1px solid #edf2f7}
        .hour-tick:last-child{border-right:none}
        .hour-time{color:#718096;margin-bottom:4px}
        .hour-temp{font-weight:700;color:#2d3748;font-size:.95em}
        .hour-desc{color:#a0aec0;font-size:.75em;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px}
        .aqi-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-top:4px}

        /* Forecast row */
        .forecast-row{display:grid;grid-template-columns:50px 1fr 90px 80px;align-items:center;padding:7px 0;border-bottom:1px solid #e2e8f0;font-size:.88em}
        .forecast-row:last-child{border-bottom:none}
        .forecast-day{font-weight:600;color:#2d3748}
        .forecast-desc{color:#718096}
        .forecast-temps{text-align:right;color:#2d3748;font-weight:500}
        .forecast-moon{text-align:right;color:#a0aec0;font-size:.82em}

        /* Gem card */
        .gem-card{background:linear-gradient(135deg,#fefcf3,#fdf6e3);border:1px solid #E8C468;border-radius:10px;padding:12px 16px;margin-bottom:8px;font-size:.92em;color:#5a4a20}

        /* Tab bar */
        .tab-bar{display:flex;gap:6px;margin-bottom:12px}
        .tab-btn{flex:1;padding:8px;background:#e2e8f0;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.88em;color:#4a5568;width:auto;transition:background .2s}
        .tab-btn:hover{background:#cbd5e0;transform:none;box-shadow:none}
        .tab-btn.active{background:#667eea;color:white}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .response-box{background:#1e1e1e;border-radius:12px;overflow:hidden;margin-top:20px}
        pre{margin:0;padding:16px;overflow-x:auto}
        pre code{font-family:Monaco,Menlo,Consolas,monospace;font-size:.85em;line-height:1.5}

        @media(max-width:768px){
            .form-row,.dashboard{grid-template-columns:1fr}
            .header h1{font-size:1.8em}
            #map{height:300px}
            .forecast-row{grid-template-columns:50px 1fr 80px}
            .forecast-moon{display:none}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BREATHE API</h1>
            <p>Click the map to explore weather, air quality, pollen, and forecasts for any location.</p>
        </div>
        <div class="content">
            <div id="map"></div>

            <div class="controls">
                <h2>Location</h2>
                <div class="form-row">
                    <div><label for="latitude">Latitude</label><input type="number" id="latitude" placeholder="34.0522" step="any" min="-90" max="90"></div>
                    <div><label for="longitude">Longitude</label><input type="number" id="longitude" placeholder="-118.2437" step="any" min="-180" max="180"></div>
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" id="includeHistorical"><span>Include historical AQI (for Hidden Gems)</span></label>
                </div>
                <button id="submitBtn" onclick="fetchData()">Get Weather & Air Quality</button>
            </div>

            <div class="loading hidden" id="loading"><div class="spinner"></div><p>Fetching data...</p></div>

            <!-- Dashboard -->
            <div class="hidden" id="dashboardWrap">
                <div class="dashboard" id="dashboard">
                    <!-- Weather -->
                    <div class="panel panel-weather">
                        <h3 id="locationLabel">Current Weather</h3>
                        <div class="weather-hero">
                            <div class="weather-temp" id="wxTemp">--</div>
                            <div class="weather-desc" id="wxDesc">--</div>
                        </div>
                        <div id="wxMetrics"></div>
                    </div>

                    <!-- Air Quality -->
                    <div class="panel panel-aqi">
                        <h3>Air Quality</h3>
                        <div id="aqiBadge" class="aqi-badge">--</div>
                        <div id="aqiMetrics"></div>
                    </div>

                    <!-- Pollen -->
                    <div class="panel panel-pollen" id="pollenPanel">
                        <h3>Pollen</h3>
                        <div id="pollenContent"></div>
                    </div>

                    <!-- Astronomy -->
                    <div class="panel panel-astro" id="astroPanel">
                        <h3>Sun & Moon</h3>
                        <div id="astroContent"></div>
                    </div>

                    <!-- Hourly (full width) -->
                    <div class="panel panel-hourly full-width">
                        <h3>48-Hour Hourly Forecast</h3>
                        <div class="hourly-strip" id="hourlyStrip"></div>
                    </div>

                    <!-- Hidden Gems -->
                    <div class="panel panel-gems full-width hidden" id="gemsPanel">
                        <h3>Hidden Gems</h3>
                        <div id="gemsContent"></div>
                    </div>

                    <!-- 10-day forecast (full width) -->
                    <div class="panel panel-forecast full-width">
                        <h3>10-Day Forecast</h3>
                        <div id="forecastContent"></div>
                    </div>
                </div>

                <!-- Raw JSON -->
                <div class="response-box" style="margin-top:24px">
                    <div style="padding:12px 16px 0">
                        <div class="tab-bar">
                            <button class="tab-btn active" onclick="switchTab('full')">Full Response</button>
                            <button class="tab-btn" onclick="switchTab('hourly')">Hourly (48h)</button>
                        </div>
                    </div>
                    <div id="tab-full" class="tab-content active"><pre><code class="language-json" id="jsonFull"></code></pre></div>
                    <div id="tab-hourly" class="tab-content"><pre><code class="language-json" id="jsonHourly"></code></pre></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script>
        // ---- Map ----
        const map = L.map('map').setView([30.332, -97.869], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors', maxZoom: 18
        }).addTo(map);
        let marker = L.marker([30.332, -97.869]).addTo(map);
        marker.bindPopup('<b>Austin, TX</b>').openPopup();
        document.getElementById('latitude').value = '30.332168';
        document.getElementById('longitude').value = '-97.868968';

        map.on('click', e => {
            const lat = e.latlng.lat.toFixed(6), lng = e.latlng.lng.toFixed(6);
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lng;
            if (marker) marker.setLatLng(e.latlng);
            else marker = L.marker(e.latlng).addTo(map);
            marker.bindPopup(`Lat: ${lat}<br>Lon: ${lng}`).openPopup();
        });

        // ---- Helpers ----
        function aqiColor(aqi) {
            if (aqi <= 50)  return '#00e400';
            if (aqi <= 100) return '#ffff00';
            if (aqi <= 150) return '#ff7e00';
            if (aqi <= 200) return '#ff0000';
            if (aqi <= 300) return '#99004c';
            return '#7e0023';
        }
        function aqiTextColor(aqi) { return aqi <= 100 ? '#333' : '#fff'; }
        function m(label, value) {
            return `<div class="metric-row"><span class="metric-label">${label}</span><span class="metric-value">${value}</span></div>`;
        }
        function fmtTime(iso) {
            if (!iso) return '--';
            const d = new Date(iso.includes('T') && !iso.includes('+') && !iso.includes('Z') ? iso + ':00' : iso);
            return d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
        }
        function fmtHour(iso) {
            if (!iso) return '';
            const d = new Date(iso.includes('T') && !iso.includes('+') && !iso.includes('Z') ? iso + ':00' : iso);
            return d.toLocaleTimeString([], {hour:'numeric'});
        }

        // ---- Tab switching ----
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        // ---- Render functions ----
        function renderWeather(c, units) {
            const deg = units === 'imperial' ? '\u00b0F' : '\u00b0C';
            const spd = units === 'imperial' ? ' mph' : ' m/s';
            if (!c) return;
            document.getElementById('wxTemp').textContent = c.temperature != null ? Math.round(c.temperature) + deg : '--';
            document.getElementById('wxDesc').textContent = c.weather_description || '--';
            let h = '';
            if (c.feels_like != null) h += m('Feels Like', Math.round(c.feels_like) + deg);
            if (c.humidity != null)   h += m('Humidity', c.humidity + '%');
            if (c.wind_speed != null) h += m('Wind', c.wind_speed + spd);
            if (c.uv_index != null)   h += m('UV Index', c.uv_index);
            if (c.cloud_cover != null) h += m('Cloud Cover', c.cloud_cover + '%');
            if (c.pressure != null)   h += m('Pressure', c.pressure + (units === 'imperial' ? ' inHg' : ' hPa'));
            document.getElementById('wxMetrics').innerHTML = h;
        }

        function renderAQI(c) {
            if (!c || c.aqi == null) return;
            const badge = document.getElementById('aqiBadge');
            badge.textContent = `AQI ${c.aqi} \u2014 ${c.aqi_category || c.category || ''}`;
            badge.style.background = aqiColor(c.aqi);
            badge.style.color = aqiTextColor(c.aqi);
            let h = '';
            if (c.dominant_pollutant) h += m('Dominant Pollutant', c.dominant_pollutant.toUpperCase());
            const p = c.pollutants || {};
            if (p.pm25 != null) h += m('PM2.5', p.pm25 + ' \u00b5g/m\u00b3');
            if (p.pm10 != null) h += m('PM10', p.pm10 + ' \u00b5g/m\u00b3');
            if (p.o3 != null)   h += m('Ozone', p.o3 + ' \u00b5g/m\u00b3');
            if (p.no2 != null)  h += m('NO\u2082', p.no2 + ' \u00b5g/m\u00b3');
            if (c.health_advice) h += `<div style="margin-top:10px;font-size:.85em;color:#718096;line-height:1.4">${c.health_advice}</div>`;
            document.getElementById('aqiMetrics').innerHTML = h;
        }

        function renderPollen(pollen) {
            const panel = document.getElementById('pollenPanel');
            if (!pollen || (!pollen.tree && !pollen.grass && !pollen.weed)) { panel.classList.add('hidden'); return; }
            const allNone = ['tree','grass','weed'].every(k => !pollen[k] || pollen[k].level === 'none');
            if (allNone) { panel.classList.add('hidden'); return; }
            panel.classList.remove('hidden');
            let h = '<div class="pollen-row">';
            ['tree','grass','weed'].forEach(k => {
                if (!pollen[k]) return;
                const lvl = pollen[k].level || 'none';
                h += `<span class="pollen-pill pollen-${lvl}">${k.charAt(0).toUpperCase()+k.slice(1)}: ${lvl.replace('_',' ')}</span>`;
            });
            h += '</div>';
            if (pollen.dominant_allergen) h += m('Dominant Allergen', pollen.dominant_allergen);
            document.getElementById('pollenContent').innerHTML = h;
        }

        function renderAstro(daily) {
            if (!daily || daily.length === 0) return;
            const today = daily[0];
            let h = '';
            h += m('Sunrise', fmtTime(today.sunrise));
            h += m('Sunset', fmtTime(today.sunset));
            if (today.golden_hour) {
                h += m('Morning Golden Hour', fmtTime(today.golden_hour.morning?.start) + ' \u2013 ' + fmtTime(today.golden_hour.morning?.end));
                h += m('Evening Golden Hour', fmtTime(today.golden_hour.evening?.start) + ' \u2013 ' + fmtTime(today.golden_hour.evening?.end));
            }
            if (today.moon_phase) {
                h += m('Moon Phase', today.moon_phase.name + ' (' + today.moon_phase.illumination + '% lit)');
            }
            document.getElementById('astroContent').innerHTML = h;
        }

        function renderHourly(hourly, units) {
            const strip = document.getElementById('hourlyStrip');
            if (!hourly || hourly.length === 0) { strip.innerHTML = '<span style="color:#999">No hourly data</span>'; return; }
            const deg = units === 'imperial' ? '\u00b0' : '\u00b0';
            let h = '';
            hourly.forEach(hr => {
                const dotColor = hr.aqi != null ? aqiColor(hr.aqi) : '#e2e8f0';
                h += `<div class="hour-tick">
                    <div class="hour-time">${fmtHour(hr.time)}</div>
                    <div class="hour-temp">${hr.temperature != null ? Math.round(hr.temperature) + deg : '--'}</div>
                    <div class="hour-desc">${hr.weather_description || ''}</div>
                    <div><span class="aqi-dot" style="background:${dotColor}" title="AQI ${hr.aqi ?? '?'}"></span></div>
                </div>`;
            });
            strip.innerHTML = h;
        }

        function renderGems(gems) {
            const panel = document.getElementById('gemsPanel');
            if (!gems || gems.length === 0) { panel.classList.add('hidden'); return; }
            panel.classList.remove('hidden');
            document.getElementById('gemsContent').innerHTML = gems.map(g =>
                `<div class="gem-card">${g.text}</div>`
            ).join('');
        }

        function renderForecast(daily, units) {
            if (!daily || daily.length === 0) return;
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const deg = units === 'imperial' ? '\u00b0' : '\u00b0';
            let h = '';
            daily.forEach(d => {
                const dt = new Date(d.date + 'T12:00:00');
                const day = dayNames[dt.getDay()];
                const hi = d.temp_high != null ? Math.round(d.temp_high) + deg : '--';
                const lo = d.temp_low != null ? Math.round(d.temp_low) + deg : '--';
                const moon = d.moon_phase ? d.moon_phase.name : '';
                h += `<div class="forecast-row">
                    <span class="forecast-day">${day}</span>
                    <span class="forecast-desc">${d.weather_description || ''}</span>
                    <span class="forecast-temps">${hi} / ${lo}</span>
                    <span class="forecast-moon">${moon}</span>
                </div>`;
            });
            document.getElementById('forecastContent').innerHTML = h;
        }

        // ---- Main fetch ----
        async function fetchData() {
            const lat = document.getElementById('latitude').value;
            const lng = document.getElementById('longitude').value;
            const hist = document.getElementById('includeHistorical').checked;
            if (!lat || !lng) { alert('Select a location on the map or enter coordinates.'); return; }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('dashboardWrap').classList.add('hidden');
            document.getElementById('submitBtn').disabled = true;

            const url = `/api/v1/public/jaspr/?lat=${lat}&lon=${lng}&units=imperial${hist ? '&include_historical=true' : ''}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) { alert('API error: ' + data.error); return; }

                // Location label
                const loc = data.location || {};
                document.getElementById('locationLabel').textContent =
                    (loc.city ? loc.city + ', ' : '') + (loc.region || loc.country || 'Current Weather');

                // Render all panels
                renderWeather(data.current, data.units || 'imperial');
                renderAQI(data.current);
                renderPollen(data.current?.pollen);
                renderAstro(data.daily_forecast);
                renderHourly(data.hourly_forecast, data.units || 'imperial');
                renderGems(data.hidden_gems);
                renderForecast(data.daily_forecast, data.units || 'imperial');

                // Raw JSON tabs
                const trimmed = {...data, hourly_forecast: `[${data.hourly_forecast?.length || 0} entries — see Hourly tab]`};
                document.getElementById('jsonFull').textContent = JSON.stringify(trimmed, null, 2);
                document.getElementById('jsonHourly').textContent = JSON.stringify(data.hourly_forecast, null, 2);
                hljs.highlightElement(document.getElementById('jsonFull'));
                hljs.highlightElement(document.getElementById('jsonHourly'));

                document.getElementById('dashboardWrap').classList.remove('hidden');
                document.getElementById('dashboard').scrollIntoView({behavior:'smooth', block:'start'});

            } catch (err) {
                console.error(err);
                alert('Error fetching data. Check console for details.');
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('submitBtn').disabled = false;
            }
        }

        document.getElementById('latitude').addEventListener('keypress', e => { if (e.key === 'Enter') fetchData(); });
        document.getElementById('longitude').addEventListener('keypress', e => { if (e.key === 'Enter') fetchData(); });
    </script>
</body>
</html>
